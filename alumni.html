<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Research Lab — AI for Medical Imaging, Multimodal LLMs, Federated Learning" />
  <title>Research Lab | Home</title>
  <style>
    :root{
       --bg: #242e42; /*#0b0f17; */
      --panel:#101827;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#a3aab8;
      --brand:#60a5fa;
      --brand2:#34d399;
      --border:#1f2a44;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --max: 1100px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 600px at 20% -10%, rgba(96,165,250,.25), transparent 60%),
                  radial-gradient(900px 500px at 90% 0%, rgba(52,211,153,.18), transparent 55%),
                  var(--bg); 
      color:var(--text);
      line-height:1.55;
    }
    a{color:inherit; text-decoration:none}
    a:hover{color:var(--brand)}
    .container{max-width:var(--max); margin:0 auto; padding:0 20px}
    .skip{position:absolute; left:-999px; top:auto; width:1px; height:1px; overflow:hidden}
    .skip:focus{left:20px; top:20px; width:auto; height:auto; background:#000; padding:10px 12px; border-radius:10px; z-index:999}

    /* Header */
    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,.65);
      border-bottom: 1px solid rgba(31,42,68,.6);
      z-index:50;
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0;
      gap:14px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:700;
      letter-spacing:.2px;
      white-space:nowrap;
    }
    .logo{
      width:38px; height:38px; border-radius:12px;
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.9));
      box-shadow: 0 10px 24px rgba(96,165,250,.25);
      position:relative;
    }
    .logo:after{
      content:"";
      position:absolute; inset:9px;
      border-radius:10px;
      background: rgba(11,15,23,.55);
      border:1px solid rgba(255,255,255,.12);
    }
    nav ul{
      display:flex; gap:16px;
      list-style:none; margin:0; padding:0;
      align-items:center;
    }
    nav a{
      padding:10px 10px;
      border-radius:12px;
      color:var(--muted);
      font-weight:600;
      font-size:14px;
    }
    nav a:hover{background:rgba(255,255,255,.06); color:var(--text)}
    .cta{
      display:flex; gap:10px; align-items:center;
    }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color:var(--text);
      font-weight:700;
      font-size:14px;
      cursor:pointer;
    }
    .btn:hover{border-color:rgba(96,165,250,.5); box-shadow: 0 0 0 3px rgba(96,165,250,.18)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.9), rgba(52,211,153,.85));
      border-color: transparent;
      color:#071018;
    }
    .btn.primary:hover{box-shadow: 0 0 0 3px rgba(52,211,153,.18)}
    .menuBtn{display:none}

    /* Hero */
    .hero{
      padding:46px 0 18px;
    }
    .heroGrid{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:18px;
      align-items:stretch;
    }
    .card{
      background: rgba(16,24,39,.75); 
      border: 1px solid rgba(31,42,68,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .heroMain{
      padding:28px;
      position:relative;
      overflow:hidden;
    }
    .heroMain:before{
      content:"";
      position:absolute; inset:-80px -120px auto auto;
      width:320px; height:320px;
      background: radial-gradient(circle at 30% 30%, rgba(96,165,250,.35), transparent 60%);
      transform: rotate(10deg);
      pointer-events:none;
    }
    .kicker{
      display:inline-flex; align-items:center; gap:10px;
      color: var(--muted);
      font-weight:700;
      font-size:13px;
      letter-spacing:.4px;
      text-transform:uppercase;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      padding:8px 10px;
      border-radius:999px;
    }
    .dot{
      width:8px; height:8px; border-radius:50%;
      background: var(--brand2);
      box-shadow: 0 0 0 4px rgba(52,211,153,.12);
    }
    h1{
      margin:16px 0 10px;
      font-size: 40px;
      line-height: 1.08;
      letter-spacing: -0.6px;
    }
    .lead{
      color: var(--muted);
      font-size:16px;
      margin:0 0 18px;
      max-width: 62ch;
    }
    .pillRow{
      display:flex; flex-wrap:wrap; gap:10px;
      margin:16px 0 18px;
    }
    .pill{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      padding:8px 10px;
      border-radius: 999px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .heroSide{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .sideItem{
      padding:14px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }
    .sideItem h3{
      margin:0 0 6px;
      font-size:14px;
      letter-spacing:.2px;
    }
    .sideItem p{
      margin:0;
      color:var(--muted);
      font-size:13px;
    }
    .miniGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:12px;
    }

    /* Sections */
    section{padding:24px 0}
    .sectionTitle{
      display:flex; align-items:flex-end; justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .sectionTitle h2{
      margin:0;
      font-size:22px;
      letter-spacing:-.2px;
    }
    .sectionTitle p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      max-width: 62ch;
    }
    .grid3{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:14px;
    }
    .feature{
      padding:16px;
      border-radius: var(--radius);
      border: 1px solid rgba(31,42,68,.9);
      background: rgba(15,23,42,.65);
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
    }
    .feature .icon{
      width:40px; height:40px; border-radius: 14px;
      background: rgba(96,165,250,.12);
      border: 1px solid rgba(96,165,250,.25);
      display:flex; align-items:center; justify-content:center;
      margin-bottom:10px;
      font-weight:900;
      color: var(--brand);
    }
    .feature h3{margin:0 0 6px; font-size:16px}
    .feature p{margin:0; color:var(--muted); font-size:14px}

    /* News / Highlights */
    .twoCol{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    .list{
      padding:16px;
    }
    .item{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      margin-bottom:10px;
    }
    .item:last-child{margin-bottom:0}
    .newsThumb{
      width:75px;
      height:75px;
      flex:0 0 75px;
      border-radius:12px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      display:grid;
      place-items:center;
    }
    .newsThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .newsBody{
      min-width:0;
      flex:1;
    }
    .item .meta{color:var(--muted); font-size:12px; margin-bottom:4px}
    .item .title{font-weight:800; margin:0 0 4px; font-size:14px}
    .item .desc{margin:0; color:var(--muted); font-size:13px}

    /* People */
    .peopleGrid{
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:14px;
    }
    .person{
      padding:14px;
      border-radius: var(--radius);
      border: 1px solid rgba(31,42,68,.9);
      background: rgba(16,24,39,.65);
      overflow:hidden;
    }
    .avatar{
      width:auto;
      height:auto;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      display:grid;
      place-items:center;
    }
    .avatar img{
      width:100% !important;
      height:100% !important;
      object-fit: contain;
      object-position: center;
      display:block;
      line-height:0;
    }
    .person h3{margin:0 0 2px; font-size:15px}
    .role{color:var(--muted); font-size:13px; margin:0 0 10px}
    .tags{display:flex; flex-wrap:wrap; gap:8px}
    .tag{
      font-size:12px;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      padding:6px 8px;
      border-radius: 999px;
    }

    /* Publications */
    .pub{
      padding:14px;
      border-radius: var(--radius);
      border: 1px solid rgba(31,42,68,.9);
      background: rgba(15,23,42,.6);
    }
    .pub .title{font-weight:900; margin:0 0 6px}
    .pub .authors{color:var(--muted); margin:0 0 8px; font-size:13px}
    .pub .links{display:flex; flex-wrap:wrap; gap:10px}
    .chip{
      font-size:13px;
      font-weight:800;
      padding:8px 10px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
    }

    /* Contact */
    .contactGrid{
      display:block;
    }
    .contactBox{padding:16px}
    label{display:block; margin:10px 0 6px; color:var(--muted); font-size:13px; font-weight:700}
    input, textarea{
      width:100%;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding:12px 12px;
      color: var(--text);
      outline:none;
      font-size:14px;
    }
    textarea{min-height:120px; resize:vertical}
    input:focus, textarea:focus{border-color: rgba(96,165,250,.6); box-shadow: 0 0 0 3px rgba(96,165,250,.15)}
    .note{color:var(--muted); font-size:13px; margin:10px 0 0}
    footer{
      padding:28px 0 40px;
      color: rgba(163,170,184,.9);
      border-top: 1px solid rgba(31,42,68,.6);
      margin-top: 20px;
    }
    .footerRow{
      display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap;
      align-items:center;
    }
    .small{font-size:13px}

    /* Responsive */
    @media (max-width: 980px){
      .heroGrid{grid-template-columns:1fr}
      .grid3{grid-template-columns:1fr}
      .twoCol{grid-template-columns:1fr}
      .peopleGrid{grid-template-columns: repeat(2, minmax(0,1fr))}
      .contactGrid{grid-template-columns:1fr}
    }
    @media (max-width: 720px){
      nav ul{display:none}
      .menuBtn{display:inline-flex}
      .peopleGrid{grid-template-columns:1fr}
      h1{font-size:34px}
      .newsThumb{width:40px; height:40px; flex:0 0 40px}
    }
  </style>

    body.light .btn{
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(215,224,234,1);
      color: var(--text);
    }

    body.light .btn:hover{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    body.light .btn.primary{
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(16,185,129,.85));

      border-color: transparent;
    }

    body.light .logo:after{
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(22,32,51,.08);
    }

    body.light .lead,
    body.light .role,
    body.light .authors,
    body.light .item .meta,
    body.light .item .desc,
    body.light .note,
    body.light label,
    body.light .sectionTitle p,
    body.light footer,
    body.light .small,
    body.light .sideItem p{
      color: var(--muted);
    }

    body.light input:focus,
    body.light textarea:focus{
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    body.light footer{
      border-top: 1px solid rgba(215,224,234,.95);
    }
  </style>
</head>

  <script>
    // footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // mobile menu toggle
    const btn = document.getElementById('menuBtn');
    const mobileNav = document.getElementById('mobileNav');
    if (btn) {
      btn.addEventListener('click', () => {
        const isOpen = mobileNav.style.display === 'block';
        mobileNav.style.display = isOpen ? 'none' : 'block';
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    }

    // theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'light') {
      document.body.classList.add('light');
      if (themeToggle) themeToggle.textContent = '🌙 Dark Mode';
    }

    if (themeToggle) {
      themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light');

        if (isLight) {
          themeToggle.textContent = '🌙 Dark Mode';
          localStorage.setItem('theme', 'light');
        } else {
          themeToggle.textContent = '☀ Light Mode';
          localStorage.setItem('theme', 'dark');
        }
      });
    }
  </script>

  <script>
    async function loadNews() {
      const newsList = document.getElementById('newsList');
      if (!newsList) return;

      try {
        const response = await fetch('arxiv/news26.json');
        if (!response.ok) throw new Error('Failed to load news...');

        const newsItems = await response.json();

        if (!Array.isArray(newsItems) || newsItems.length === 0) {
          newsList.innerHTML = `
            <div class="item">
              <div class="newsBody">
                <div class="meta">No news available</div>
                <p class="title">No news items were found ...</p>
              </div>
            </div>
          `;
          return;
        }

        newsList.innerHTML = newsItems.map(item => {
          const imageHtml = item.image
            ? `
              <div class="newsThumb">
                <img src="${item.image}" alt="${item.imageAlt || item.title || 'News image'}" loading="lazy" />
              </div>
            `
            : '';

          const titleHtml = item.url && item.url.trim() !== ''
            ? `<p class="title"><a href="${item.url}">${item.title || ''}</a></p>`
            : `<p class="title">${item.title || ''}</p>`;

          const descHtml = item.desc ? `<p class="desc">${item.desc}</p>` : '';

          return `
            <div class="item">
              ${imageHtml}
              <div class="newsBody">
                <div class="meta">${item.meta || ''}</div>
                ${titleHtml}
                ${descHtml}
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        newsList.innerHTML = `
          <div class="item">
            <div class="newsBody">
              <div class="meta">Error</div>
              <p class="title">Could not load news items...</p>
              <p class="desc">${error.message}</p>
            </div>
          </div>
        `;
        console.error('News loading error:', error);
      }
    }

    loadNews();
  </script>

            : `<p class="title">${item.title || ''}</p>`;

          const descHtml = item.desc ? `<p class="desc">${item.desc}</p>` : '';

          return `
            <div class="item">
              ${imageHtml}
              <div class="newsBody">
                <div class="meta">${item.meta || ''}</div>
                ${titleHtml}
                ${descHtml}
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        newsList2025.innerHTML = `
          <div class="item">
            <div class="newsBody">
              <div class="meta">Error</div>
              <p class="title">Could not load news items...</p>
              <p class="desc">${error.message}</p>
            </div>
          </div>
        `;
        console.error('News loading error:', error);
      }
    }

    loadNews();
  </script>
  
  <script>
    async function loadNews() {
      const newsList2024 = document.getElementById('newsList2024');
      if (!newsList2024) return;

      try {
        const response = await fetch('arxiv/news24.json');
        if (!response.ok) throw new Error('Failed to load news...');

        const newsItems = await response.json();

        if (!Array.isArray(newsItems) || newsItems.length === 0) {
          newsList2024.innerHTML = `
            <div class="item">
              <div class="newsBody">
                <div class="meta">No news available</div>
                <p class="title">No news items were found ...</p>
              </div>
            </div>
          `;
          return;
        }

        newsList2024.innerHTML = newsItems.map(item => {
          const imageHtml = item.image
            ? `
              <div class="newsThumb">
                <img src="${item.image}" alt="${item.imageAlt || item.title || 'News image'}" loading="lazy" />
              </div>
            `
            : '';

          const titleHtml = item.url && item.url.trim() !== ''
            ? `<p class="title"><a href="${item.url}">${item.title || ''}</a></p>`
            : `<p class="title">${item.title || ''}</p>`;

          const descHtml = item.desc ? `<p class="desc">${item.desc}</p>` : '';

          return `
            <div class="item">
              ${imageHtml}
              <div class="newsBody">
                <div class="meta">${item.meta || ''}</div>
                ${titleHtml}
                ${descHtml}
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        newsList2024.innerHTML = `
          <div class="item">
            <div class="newsBody">
              <div class="meta">Error</div>
              <p class="title">Could not load news items...</p>
              <p class="desc">${error.message}</p>
            </div>
          </div>
        `;
        console.error('News loading error:', error);
      }
    }

    loadNews();
  </script>

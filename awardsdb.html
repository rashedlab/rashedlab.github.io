<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Full list of Awards." />
  <title>Awards | RASHED LAB</title>

  <style>
    :root{
      --bg: #242e42;
      --panel:#101827;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#a3aab8;
      --brand:#60a5fa;
      --brand2:#34d399;
      --border:#1f2a44;
      --line: rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --max: 1100px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(96,165,250,.20), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(52,211,153,.14), transparent 55%),
        var(--bg);
      color:var(--text);
      line-height:1.55;
    }

    a{color:inherit; text-decoration:none}
    a:hover{color:var(--brand)}
    .container{max-width:var(--max); margin:0 auto; padding:0 20px}

    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,.70);
      border-bottom: 1px solid rgba(31,42,68,.6);
      z-index:50;
    }

    .nav{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0; gap:14px;
    }

    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:900; letter-spacing:.2px; white-space:nowrap;
    }

    .logo{
      width:38px; height:38px; border-radius:12px;
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.9));
      box-shadow: 0 10px 24px rgba(96,165,250,.25);
      position:relative;
    }

    .logo:after{
      content:"";
      position:absolute; inset:9px;
      border-radius:10px;
      background: rgba(11,15,23,.55);
      border:1px solid rgba(255,255,255,.12);
    }

    nav a{
      padding:10px 10px;
      border-radius:12px;
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }

    nav a:hover{background:rgba(255,255,255,.06); color:var(--text)}

    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color:var(--text);
      font-weight:800;
      font-size:14px;
      cursor:pointer;
    }

    .btn:hover{border-color:rgba(96,165,250,.5); box-shadow: 0 0 0 3px rgba(96,165,250,.18)}

    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.9), rgba(52,211,153,.85));
      border-color: transparent;
      color:#071018;
    }

    .hero{
      padding:32px 0 10px;
    }

    .card{
      background: rgba(16,24,39,.75);
      border: 1px solid rgba(31,42,68,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .heroBox{
      padding:22px;
    }

    h1{
      margin:10px 0 6px;
      font-size: 34px;
      letter-spacing: -0.6px;
      line-height:1.1;
    }

    .lead{margin:0; color:var(--muted); max-width:70ch}

    main{padding:10px 0 40px}
    section{padding:18px 0}

    h2{
      margin:0;
      font-size:20px;
      letter-spacing:-.2px
    }

    footer{
      padding:26px 0 38px;
      border-top: 1px solid rgba(31,42,68,.6);
      color: rgba(163,170,184,.9);
    }

    .footerRow{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:center
    }

    .small{font-size:13px}

    .awardList{
      padding:14px;
    }

    .awardItem{
      display:flex;
      gap:14px;
      align-items:flex-start;
      padding:12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      margin-bottom:10px;
    }

    .awardItem:last-child{margin-bottom:0}

    .awardThumb{
      width:120px;
      height:120px;
      flex:0 0 120px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      display:grid;
      place-items:center;
    }

    .awardThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .awardBody{flex:1; min-width:0;}

    .meta{
      color:var(--muted);
      font-size:12px;
      margin-bottom:4px
    }

    .title{
      font-weight:800;
      margin:0 0 4px;
      font-size:14px
    }

    .desc{
      margin:0;
      color:var(--muted);
      font-size:13px
    }

    .btnRow{
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .empty{
      padding:16px;
      color:var(--muted);
    }

    #themeToggle{
      min-width:120px;
    }

    body.light{
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel2: #eef3f9;
      --text: #162033;
      --muted: #5f6b7a;
      --brand: #2563eb;
      --brand2: #10b981;
      --border: #d7e0ea;
      --line: rgba(22,32,51,.10);
      --shadow: 0 10px 30px rgba(15,23,42,.08);

      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(37,99,235,.12), transparent 60%),
        radial-gradient(900px 500px at 90% 0%, rgba(16,185,129,.10), transparent 55%),
        var(--bg);
      color: var(--text);
    }

    body.light header{
      background: rgba(255,255,255,.82);
      border-bottom: 1px solid rgba(215,224,234,.95);
    }

    body.light .card{
      background: rgba(255,255,255,.88);
      border-color: var(--border);
      box-shadow: var(--shadow);
    }

    body.light nav a{
      color: var(--muted);
    }

    body.light nav a:hover{
      background: rgba(37,99,235,.08);
      color: var(--text);
    }

    body.light .btn{
      background: rgba(255,255,255,.9);
      border: 1px solid rgba(215,224,234,1);
      color: var(--text);
    }

    body.light .btn:hover{
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    body.light .btn.primary{
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(16,185,129,.85));
      color: #ffffff;
      border-color: transparent;
    }

    body.light .logo:after{
      background: rgba(255,255,255,.65);
      border: 1px solid rgba(22,32,51,.08);
    }

    body.light .lead,
    body.light .meta,
    body.light .desc,
    body.light footer,
    body.light .small{
      color: var(--muted);
    }

    body.light .awardItem{
      background: rgba(239,244,250,.85);
      border-color: rgba(215,224,234,1);
    }

    body.light .awardThumb{
      background: rgba(255,255,255,.9);
      border-color: rgba(215,224,234,1);
    }

    body.light footer{
      border-top: 1px solid rgba(215,224,234,.95);
    }

    @media (max-width: 720px){
      h1{font-size:28px}
      nav{display:none}
      .awardThumb{width:60px; height:60px; flex:0 0 60px;}
    }
  </style>

  <!-- Papa Parse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>
  <header>
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html" aria-label="Back to home">
          <span class="logo" aria-hidden="true"></span>
          <span>RASHED LAB</span>
        </a>

        <nav aria-label="Primary navigation">
          <a href="index.html#news">News</a>
          <a href="index.html#research">Research</a>
          <a href="index.html#people">People</a>
          <a href="publications.html">Publications</a>
          <a href="index.html#awards" style="color:var(--text); background:rgba(255,255,255,.06);">Awards</a>
          <a href="index.html#contact">Contact</a>
        </nav>

        <div class="cta">
          <button class="btn" id="themeToggle" type="button" aria-label="Toggle color theme">☀ Light Mode</button>
        </div>
      </div>
    </div>
  </header>

  <div class="hero" id="top">
    <div class="container">
      <div class="card heroBox">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start;">
          <div>
            <h1>Awards & Recognitions</h1>
            <p class="lead">
              Highlights of awards and recognitions for the lab members and collaborators.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div class="container">
      <section class="hero">
        <h2>Awards</h2>
      </section>

      <div class="card">
        <div id="awardsList" class="awardList">
          <div class="empty">Loading awards...</div>
        </div>
      </div>

      <section class="hero">
        <h2>Recognitions</h2>
      </section>

      <div class="card">
        <div id="recognitionsList" class="awardList">
          <div class="empty">Loading recognitions...</div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footerRow">
        <div class="brand" style="gap:10px;">
          <span class="logo" aria-hidden="true" style="width:34px;height:34px;border-radius:12px;"></span>
          <div>
            <div style="font-weight:900;">RASHED LAB</div>
            <div class="small">Awards • Updated regularly</div>
          </div>
        </div>
        <div class="small">© <span id="year"></span> Rashed Lab.</div>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');

    if (savedTheme === 'light') {
      document.body.classList.add('light');
      themeToggle.textContent = '🌙 Dark Mode';
    }

    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      if (isLight) {
        themeToggle.textContent = '🌙 Dark Mode';
        localStorage.setItem('theme', 'light');
      } else {
        themeToggle.textContent = '☀ Light Mode';
        localStorage.setItem('theme', 'dark');
      }
    });

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function createButtons(row) {
      const buttons = [];

      if (row.link1_url && row.link1_label) {
        buttons.push(`
          <a class="btn" href="${escapeHtml(row.link1_url)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(row.link1_label)}
          </a>
        `);
      }

      if (row.link2_url && row.link2_label) {
        buttons.push(`
          <a class="btn" href="${escapeHtml(row.link2_url)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(row.link2_label)}
          </a>
        `);
      }

      if (row.link3_url && row.link3_label) {
        buttons.push(`
          <a class="btn" href="${escapeHtml(row.link3_url)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(row.link3_label)}
          </a>
        `);
      }

      return buttons.length ? `<div class="btnRow">${buttons.join('')}</div>` : '';
    }

    function createAwardItem(row) {
      const imageSrc = row.image && row.image.trim() ? row.image.trim() : 'assets/awards/placeholder.jpg';
      const altText = row.alt && row.alt.trim() ? row.alt.trim() : row.title || 'Award image';

      return `
        <div class="awardItem">
          <div class="awardThumb">
            <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(altText)}" loading="lazy">
          </div>
          <div class="awardBody">
            <div class="meta">${escapeHtml(row.meta)}</div>
            <p class="title">${escapeHtml(row.title)}</p>
            <p class="desc">${escapeHtml(row.desc)}</p>
            ${createButtons(row)}
          </div>
        </div>
      `;
    }

    function renderCsvToList(csvPath, containerId, emptyMessage) {
      const container = document.getElementById(containerId);

      Papa.parse(csvPath, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const rows = results.data.filter(row =>
            (row.title && row.title.trim()) ||
            (row.desc && row.desc.trim())
          );

          if (!rows.length) {
            container.innerHTML = `<div class="empty">${emptyMessage}</div>`;
            return;
          }

          container.innerHTML = rows.map(createAwardItem).join('');
        },
        error: function(err) {
          container.innerHTML = `<div class="empty">Failed to load data: ${escapeHtml(err.message || 'Unknown error')}</div>`;
        }
      });
    }

    renderCsvToList('data/awards.csv', 'awardsList', 'No awards found.');
    renderCsvToList('data/recognitions.csv', 'recognitionsList', 'No recognitions found.');
  </script>
</body>
</html>

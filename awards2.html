<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Full list of awards." />
  <title>Awards | RASHED LAB</title>

  <!-- Reuse the same design tokens as your main page -->
  <style>
    :root{
       --bg: #242e42; /*#0b0f17; */
      --panel:#101827;
      --panel2:#0f172a;
      --text:#e5e7eb;
      --muted:#a3aab8;
      --brand:#60a5fa;
      --brand2:#34d399;
      --border:#1f2a44;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --max: 1100px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 600px at 20% -10%, rgba(96,165,250,.20), transparent 60%),
                  radial-gradient(900px 500px at 90% 0%, rgba(52,211,153,.14), transparent 55%),
                  var(--bg);
      color:var(--text);
      line-height:1.55;
    }
    a{color:inherit; text-decoration:none}
    a:hover{color:var(--brand)}
    .container{max-width:var(--max); margin:0 auto; padding:0 20px}
    header{
      position:sticky; top:0;
      backdrop-filter: blur(10px);
      background: rgba(11,15,23,.70);
      border-bottom: 1px solid rgba(31,42,68,.6);
      z-index:50;
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 0; gap:14px;
    }
    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:900; letter-spacing:.2px; white-space:nowrap;
    }
    .logo{
      width:38px; height:38px; border-radius:12px;
      background: linear-gradient(135deg, rgba(96,165,250,.95), rgba(52,211,153,.9));
      box-shadow: 0 10px 24px rgba(96,165,250,.25);
      position:relative;
    }
    .logo:after{
      content:"";
      position:absolute; inset:9px;
      border-radius:10px;
      background: rgba(11,15,23,.55);
      border:1px solid rgba(255,255,255,.12);
    }
    nav a{
      padding:10px 10px;
      border-radius:12px;
      color:var(--muted);
      font-weight:700;
      font-size:14px;
    }
    nav a:hover{background:rgba(255,255,255,.06); color:var(--text)}
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding:10px 12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color:var(--text);
      font-weight:800;
      font-size:14px;
      cursor:pointer;
    }
    .btn:hover{border-color:rgba(96,165,250,.5); box-shadow: 0 0 0 3px rgba(96,165,250,.18)}
    .btn.primary{
      background: linear-gradient(135deg, rgba(96,165,250,.9), rgba(52,211,153,.85));
      border-color: transparent;
      color:#071018;
    }

    /* Page */
    .hero{
      padding:32px 0 10px;
    }
    .card{
      background: rgba(16,24,39,.75);
      border: 1px solid rgba(31,42,68,.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .heroBox{
      padding:22px;
    }
    h1{
      margin:10px 0 6px;
      font-size: 34px;
      letter-spacing: -0.6px;
      line-height:1.1;
    }
    .lead{margin:0; color:var(--muted); max-width:70ch}

    /* Controls */
    .controls{
      margin-top:14px;
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
    }
    .input{
      flex:1 1 320px;
      display:flex; align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
    }
    .input input{
      width:100%;
      border:none; outline:none;
      background: transparent;
      color: var(--text);
      font-size:14px;
    }
    .select{
      flex:0 0 auto;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-weight:800;
      font-size:14px;
      outline:none;
    }
    .chips{
      display:flex; flex-wrap:wrap; gap:8px;
      margin-top:12px;
    }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-weight:800;
      font-size:13px;
      cursor:pointer;
      user-select:none;
    }
    .chip.active{
      color: var(--text);
      border-color: rgba(96,165,250,.5);
      box-shadow: 0 0 0 3px rgba(96,165,250,.15);
    }

    /* Sections */
    main{padding:10px 0 40px}
    section{padding:18px 0}
    .sectionTitle{
      /* color: rgba(250, 204, 21, .80); */
      display:flex; align-items:flex-end; justify-content:space-between;
      gap:12px; margin-bottom: 10px;
    }
    h2{margin:0; font-size:20px; letter-spacing:-.2px}
    .hint{margin:0; color:var(--muted); font-size:13px}

    .pubList{display:grid; gap:12px}
    .pub{
      padding:14px;
      border-radius: var(--radius);
      border: 1px solid rgba(31,42,68,.9);
      background: rgba(150,150,150,.12); /* gray */ */
    }
    .pubTop{
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:12px; flex-wrap:wrap;
      margin-bottom:6px;
    }
    .badge{
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      white-space:nowrap;
    }
    .title{margin:0; font-weight:900}
    .meta{margin:6px 0 0; color:var(--muted); font-size:13px}
    .links{display:flex; gap:10px; flex-wrap:wrap; margin-top:10px}
    .linkBtn{
      font-size:13px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.03);
    }
    .empty{
      padding:14px;
      border-radius: var(--radius);
      border: 1px dashed rgba(255,255,255,.18);
      color: var(--muted);
      background: rgba(255,255,255,.02);
    }

    footer{
      padding:26px 0 38px;
      border-top: 1px solid rgba(31,42,68,.6);
      color: rgba(163,170,184,.9);
    }
    .footerRow{display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; align-items:center}
    .small{font-size:13px}

    @media (max-width: 720px){
      h1{font-size:28px}
      nav{display:none}
    }


    /* ===== Card wrapper ===== */
    .card{
      border:1px solid var(--line2);
      background: var(--panel);
      border-radius: var(--radius);
      padding:16px;
      margin:14px 0;
      overflow:hidden;
      position:relative;
    }
    .card:before{
      content:"";
      position:absolute; inset:-2px;
      background: radial-gradient(650px 190px at 12% 0%, rgba(96,165,250,.10), transparent 55%),
                  radial-gradient(650px 190px at 85% 10%, rgba(52,211,153,.08), transparent 55%);
      pointer-events:none;
      opacity:.9;
    }
    .card > *{position:relative}

    /* ===== Award items (same layout idea as News with left image) ===== */
    .awardItem{
      display:flex;
      gap:14px;
      align-items:flex-start;
      padding:12px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      margin-bottom:10px;
    }
    .awardItem:last-child{margin-bottom:0}

    .awardThumb{
      width:120px;
      height:120px;
      flex:0 0 120px;
      border-radius:14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      overflow:hidden;
      display:grid;
      place-items:center;
    }
    .awardThumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .awardBody{flex:1; min-width:0;}
    .meta{color:var(--muted); font-size:12px; margin-bottom:4px}
    .title{font-weight:800; margin:0 0 4px; font-size:14px}
    .desc{margin:0; color:var(--muted); font-size:13px}

    .tagRow{margin-top:8px; display:flex; gap:8px; flex-wrap:wrap}
    .tag{
      font-size:12px;
      color:var(--muted);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
      padding:6px 8px;
      border-radius:999px;
    }

    .btnRow{margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;}
    .btn{
      font-size:13px;
      padding:8px 10px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius:999px;
      color:var(--text);
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    @media (max-width:720px){
      .awardThumb{width:60px; height:60px; flex:0 0 60px;}
    }

    footer{
      margin-top:26px;
      padding-top:16px;
      border-top:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }

    
  </style>

  <style>
  :root{
    --bg: #242e42;
    --panel:#101827;
    --panel2:#0f172a;
    --text:#e5e7eb;
    --muted:#a3aab8;
    --brand:#60a5fa;
    --brand2:#34d399;
    --border:#1f2a44;
    --shadow: 0 10px 30px rgba(0,0,0,.35);
    --radius: 16px;
    --max: 1100px;
  }

  /* ... keep your existing CSS ... */

  /* Theme toggle button */
  #themeToggle{
    min-width: 120px;
  }

  /* LIGHT THEME */
  body.light{
    --bg: #f5f7fb;
    --panel: #ffffff;
    --panel2: #eef3f9;
    --text: #162033;
    --muted: #5f6b7a;
    --brand: #2563eb;
    --brand2: #10b981;
    --border: #d7e0ea;
    --shadow: 0 10px 30px rgba(15,23,42,.08);

    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(37,99,235,.12), transparent 60%),
      radial-gradient(900px 500px at 90% 0%, rgba(16,185,129,.10), transparent 55%),
      var(--bg);
    color: var(--text);
  }

  body.light header{
    background: rgba(255,255,255,.82);
    border-bottom: 1px solid rgba(215,224,234,.95);
  }

  body.light .card,
  body.light .person,
  body.light .pub,
  body.light .feature{
    background: rgba(255,255,255,.88);
    border-color: var(--border);
    box-shadow: var(--shadow);
  }

  body.light .feature{
    background: rgba(255,255,255,.92);
  }

  body.light .sideItem,
  body.light .item,
  body.light .pill,
  body.light .tag,
  body.light .chip,
  body.light input,
  body.light textarea,
  body.light .newsThumb,
  body.light .avatar,
  body.light .kicker,
  body.light #mobileNav .card{
    background: rgba(239,244,250,.85);
    border-color: rgba(215,224,234,1);
    color: var(--text);
  }

  body.light nav a{
    color: var(--muted);
  }

  body.light nav a:hover{
    background: rgba(37,99,235,.08);
    color: var(--text);
  }

  body.light .btn{
    background: rgba(255,255,255,.9);
    border: 1px solid rgba(215,224,234,1);
    color: var(--text);
  }

  body.light .btn:hover{
    border-color: rgba(37,99,235,.45);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }

  body.light .btn.primary{
    background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(16,185,129,.85));
    color: #ffffff;
    border-color: transparent;
  }

  body.light .logo:after{
    background: rgba(255,255,255,.65);
    border: 1px solid rgba(22,32,51,.08);
  }

  body.light .lead,
  body.light .role,
  body.light .authors,
  body.light .item .meta,
  body.light .item .desc,
  body.light .note,
  body.light label,
  body.light .sectionTitle p,
  body.light footer,
  body.light .small,
  body.light .sideItem p{
    color: var(--muted);
  }

  body.light input:focus,
  body.light textarea:focus{
    border-color: rgba(37,99,235,.55);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }

  body.light footer{
    border-top: 1px solid rgba(215,224,234,.95);
  }
</style>
  
</head>

<body>
  <header>
    <div class="container">
      <div class="nav">
        <a class="brand" href="index.html" aria-label="Back to home">
          <span class="logo" aria-hidden="true"></span>
          <span>RASHED LAB</span>
        </a>

        <nav aria-label="Primary navigation">
          <a href="index.html#news">News</a>
          <a href="index.html#research">Research</a>
          <a href="index.html#people">People</a>
          <a href="publications.html" style="color:var(--text); background:rgba(255,255,255,.06);">Publications</a>
          <a href="index.html#awards">Awards</a>
          <a href="index.html#contact">Contact</a>
        </nav>

       
        <div class="cta">
        <button class="btn" id="themeToggle" type="button" aria-label="Toggle color theme">☀ Light Mode</button>
        <!-- <a class="btn primary" href="#top">Browse</a> -->
        <!-- <button class="btn menuBtn" id="menuBtn" aria-expanded="false" aria-controls="mobileNav">Menu</button> -->
        </div>
        
      </div>
    </div>
  </header>

  <div class="hero" id="top">
    <div class="container">
      <div class="card heroBox">
        <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start;">
          <div>
            <h1>Awards & Recognitions</h1>
            <p class="lead">
              Highlights of awards and recognitions for the lab members and collaborators.
            </p>
          </div>
         
        </div>

       
      </div>
    </div>
  </div>
<!-- ************* -->
<!-- ************* -->

<main>
  <div class="container">
    <section class="hero">
      <h2>Awards</h2>
    </section>

    
   </div>
</main>
  
<!-- ************* -->
<!-- ************* -->

  <footer>
    <div class="container">
      <div class="footerRow">
        <div class="brand" style="gap:10px;">
          <span class="logo" aria-hidden="true" style="width:34px;height:34px;border-radius:12px;"></span>
          <div>
            <div style="font-weight:900;">RASHED LAB</div>
            <div class="small">Awardss • Updated regularly</div>
          </div>
        </div>
        <div class="small">© <span id="year"></span> Rashed Lab.</div>
      </div>
    </div>
  </footer>

  <!-- variables -->
  <script src="js/config.js"></script>

  


  <script>
  // footer year
  document.getElementById('year').textContent = new Date().getFullYear();

  // mobile menu toggle
  const btn = document.getElementById('menuBtn');
  const mobileNav = document.getElementById('mobileNav');
  if (btn) {
    btn.addEventListener('click', () => {
      const isOpen = mobileNav.style.display === 'block';
      mobileNav.style.display = isOpen ? 'none' : 'block';
      btn.setAttribute('aria-expanded', String(!isOpen));
    });
  }

  // theme toggle
  const themeToggle = document.getElementById('themeToggle');
  const savedTheme = localStorage.getItem('theme');

  if (savedTheme === 'light') {
    document.body.classList.add('light');
    if (themeToggle) themeToggle.textContent = '🌙 Dark Mode';
  }

  if (themeToggle) {
    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');

      if (isLight) {
        themeToggle.textContent = '🌙 Dark Mode';
        localStorage.setItem('theme', 'light');
      } else {
        themeToggle.textContent = '☀ Light Mode';
        localStorage.setItem('theme', 'dark');
      }
    });
  }
</script>
  
 
</body>
</html>
